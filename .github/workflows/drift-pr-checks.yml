name: "Process Drift PR Decision"

on:
  pull_request:
    types: [closed]
    branches:
      - main # Your master/main branch
  workflow_dispatch:
  inputs:
    action_type:
      description: 'Select action to perform manually'
      required: true
      type: choice
      options:
        - 'Accept (Align State)'
        - 'Reject (Revert Code)'
permissions:
  contents: read
  pull-requests: read

env:
  AWS_REGION: "us-east-1" 
  TF_VERSION: "6.5"    

jobs:
  reconcile-infra:
    # UPDATED: Matches your dynamic titles (e.g., #45, #44, #43)
    if: contains(github.event.pull_request.title, 'Drift fix')
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./test/

    steps:
      # Step 1: Check out code from your main branch
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Configure AWS Credentials (Reads your S3 bucket backend)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 3: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 4: Initialize Terraform (Connects to S3 bucket backend automatically)
      - name: Terraform Init
        run: terraform init

      # =================================================================
      # SCENARIO A: User ACCEPTED (Merged) the PR
      # =================================================================
      - name: Execute Live State Alignment (PR Merged)
        if: github.event.pull_request.merged == true
        run: |
          echo "✅ PR was Merged. Aligning S3 State file with the approved live changes."
          terraform apply -auto-approve

      # =================================================================
      # SCENARIO B: User REJECTED (Closed without merging) the PR
      # =================================================================
      - name: Overwrite Drift with Original Code (PR Closed/Rejected)
        if: github.event.pull_request.merged == false
        run: |
          echo "❌ PR was Closed/Rejected. Overwriting AWS changes and reverting to your Git codebase."
          terraform refresh
          terraform apply -auto-approve
