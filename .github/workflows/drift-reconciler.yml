name: "Process Drift PR Decision"
run-name: "Drift PR Decision — ${{ github.event.pull_request.merged == true && 'ACCEPTED' || 'REJECTED' }} (#${{ github.event.pull_request.number }})"

on:
  pull_request:
    types: [closed]
    branches:
      - main

  workflow_dispatch:
    inputs:
      action_type:
        description: 'Manual override'
        required: true
        type: choice
        options:
          - 'Accept (Align State)'
          - 'Reject (Revert Code)'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: "us-east-1"
  TF_VERSION: "1.9.8"
  TF_WORKING_DIR: "test/ec2_terraform"

jobs:
  reconcile-infra:
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'Drift fix')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # =================================================================
      # SCENARIO A: ACCEPTED (Merged) → Code already matches live state.
      # The PR author updated the .tf files to reflect the drift, so we
      # just need to align state — there should be zero changes.
      # =================================================================
      - name: "[ACCEPT] Align State with Merged Code"
        id: accept
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action_type == 'Accept (Align State)')
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -e
          echo "✅ ACCEPTED: Aligning Terraform state with merged code..."
          terraform plan -detailed-exitcode -input=false -out=tfplan 2>&1 | tee plan-output.txt
          PLAN_EXIT="${PIPESTATUS[0]}"
          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "No changes — state already aligned."
          elif [ "$PLAN_EXIT" -eq 2 ]; then
            echo "Applying state alignment..."
            terraform apply -auto-approve tfplan
          else
            echo "❌ terraform plan failed with exit code $PLAN_EXIT"
            cat plan-output.txt
            exit 1
          fi
        continue-on-error: false

      # =================================================================
      # SCENARIO B: REJECTED (Closed without merge) → AWS drifted from
      # what the .tf files declare.  Apply the code as-is to revert AWS
      # back to the intended configuration.
      # =================================================================
      - name: "[REJECT] Revert AWS to Match Code"
        id: reject
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.merged == false) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action_type == 'Reject (Revert Code)')
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -e
          echo "❌ REJECTED: Reverting AWS to match Terraform code..."
          terraform plan -detailed-exitcode -input=false -out=tfplan 2>&1 | tee plan-output.txt
          PLAN_EXIT="${PIPESTATUS[0]}"
          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "No drift detected — AWS already matches code. Nothing to revert."
          elif [ "$PLAN_EXIT" -eq 2 ]; then
            echo "Drift detected. Applying revert to restore AWS to code-defined state..."
            terraform apply -auto-approve tfplan
            echo "✅ REVERTED: AWS has been restored to match the Terraform code."
          else
            echo "❌ terraform plan failed with exit code $PLAN_EXIT"
            cat plan-output.txt
            exit 1
          fi
        continue-on-error: false

      - name: Comment Result
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const merged = '${{ github.event.pull_request.merged }}' === 'true';
            const acceptOk = '${{ steps.accept.outcome }}' === 'success';
            const rejectOk = '${{ steps.reject.outcome }}' === 'success';
            let outcome;
            if (merged && acceptOk) {
              outcome = '✅ **ACCEPTED**: State aligned with merged code.';
            } else if (merged && !acceptOk) {
              outcome = '⚠️ **ACCEPTED but state alignment FAILED** — check workflow logs.';
            } else if (!merged && rejectOk) {
              outcome = '❌ **REJECTED**: AWS reverted to match Terraform code.';
            } else {
              outcome = '⚠️ **REJECTED but revert FAILED** — check workflow logs.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: outcome
            });