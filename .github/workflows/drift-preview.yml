name: "Preview Drift Plan"

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: "us-east-1"
  TF_VERSION: "1.9.8"

jobs:
  preview:
    if: contains(github.event.pull_request.title, 'Drift fix')
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./test/

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const planOutput = `${{ steps.plan.outputs.stdout }}${{ steps.plan.outputs.stderr }}`;
            const truncated = planOutput.length > 6000 ? planOutput.substring(0, 6000) + '\n\n... (truncated)' : planOutput;
            
            const body = `## 📋 Drift Plan Preview
            
            **PR:** #${{ github.event.pull_request.number }}
            
            <details><summary>📝 Click to expand Terraform Plan</summary>
            
            \`\`\`\n${truncated}\n\`\`\`
            
            </details>
            
            ---
            
            **Next Steps:**
            - ✅ **Merge this PR** → Accept the drift. Apply code to match live AWS state.
            - ❌ **Close this PR** → Reject the drift. Revert AWS to match original code.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });