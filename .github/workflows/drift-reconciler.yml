name: "Process Drift PR Decision"

on:
  pull_request:
    types: [closed]
    branches:
      - main

  workflow_dispatch:
    inputs:
      action_type:
        description: 'Manual override'
        required: true
        type: choice
        options:
          - 'Accept (Align State)'
          - 'Reject (Revert Code)'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: "us-east-1"
  TF_VERSION: "1.9.8"

jobs:
  reconcile-infra:
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'Drift fix')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ./test/ec2_terraform/

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      # ─── SCENARIO A: ACCEPTED (Merged) ───
      - name: Plan & Apply Accepted Drift
        if: |
          github.event.pull_request.merged == true || 
          github.event.inputs.action_type == 'Accept (Align State)'
        run: |
          echo "✅ ACCEPTED: Planning drift fix..."
          terraform plan -out=tfplan -input=false
          echo "Applying approved changes..."
          terraform apply -auto-approve tfplan

      - name: Label PR as Accepted
        if: github.event.pull_request.merged == true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['drift-accepted']
            });

      # ─── SCENARIO B: REJECTED (Closed without merge) ───
      - name: Plan & Revert Drift
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.merged == false) ||
          github.event.inputs.action_type == 'Reject (Revert Code)'
        run: |
          echo "❌ REJECTED: Reverting unauthorized drift..."
          terraform plan -out=tfplan -input=false
          echo "Applying revert to match original code..."
          terraform apply -auto-approve tfplan

      - name: Label PR as Rejected
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == false
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['drift-rejected']
            });

      # ─── Final Comment ───
      - name: Comment Result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const merged = '${{ github.event.pull_request.merged }}' === 'true';
            const outcome = merged 
              ? '✅ **ACCEPTED**: Drift fix applied. Git now matches live AWS state.' 
              : '❌ **REJECTED**: Unauthorized drift reverted. AWS restored to match original code.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${outcome}\n\n🔗 [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });