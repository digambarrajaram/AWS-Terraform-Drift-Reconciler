name: Drift PR Validation

# Runs on PRs opened by the drift reconciler (branch pattern: reconcile/drift-*)
# Validates: terraform fmt → terraform validate → checkov scan → terraform plan

on:
  pull_request:
    branches: [drift, main]
    paths:
      - 'reconcile_*.tf'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [fmt, validate, checkov, plan]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform fmt
        if: matrix.check == 'fmt'
        run: terraform fmt -check -recursive -diff reconcile_*.tf

      - name: Terraform validate
        if: matrix.check == 'validate'
        run: |
          for f in reconcile_*.tf; do
            [ -f "$f" ] || continue
            echo "::group::Validating $f"
            terraform validate -json || echo "::warning::Validation failed for $f"
            echo "::endgroup::"
          done

      - name: Checkov scan
        if: matrix.check == 'checkov'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          file: reconcile_*.tf
          framework: terraform
          output_format: sarif
          soft_fail: true

      - name: Terraform plan (dry-run)
        if: matrix.check == 'plan'
        run: |
          for f in reconcile_*.tf; do
            [ -f "$f" ] || continue
            echo "::group::Planning $f"
            terraform plan -no-color -input=false -detailed-exitcode || EXIT=$?
            echo "::endgroup::"
          done

      - name: Post results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `
            ## 🤖 CI/CD Drift Validation Results

            | Check | Status |
            |-------|--------|
            | Terraform fmt | ${{ jobs.validate.result == 'success' && '✅' || '❌' }} |
            | Terraform validate | ${{ needs.validate.result == 'success' && '✅' || '❌' }} |
            | Checkov scan | ${{ needs.validate.result == 'success' && '✅' || '⚠️' }} |
            | Terraform plan | ${{ needs.validate.result == 'success' && '✅' || '❌' }} |

            > Checks run automatically on drift reconciliation PRs.
            > Review results before merging.
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary,
            });
