name: Drift Coverage Guardrails

on:
  pull_request:
    branches: [main, drift]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  drift-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'

      - name: Infrastructure drift check
        env:
          TERRAFORM_DIR: ./terraform/ec2
          PAGERDUTY_ROUTING_KEY: ${{ secrets.PAGERDUTY_ROUTING_KEY }}
          DRIFT_ALERT_WEBHOOK_URL: ${{ secrets.DRIFT_ALERT_WEBHOOK_URL }}
        run: node scripts/check-infra-drift.mjs

      - name: Operational drift check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          PAGERDUTY_ROUTING_KEY: ${{ secrets.PAGERDUTY_ROUTING_KEY }}
          DRIFT_ALERT_WEBHOOK_URL: ${{ secrets.DRIFT_ALERT_WEBHOOK_URL }}
        run: node scripts/check-operational-drift.mjs

      - name: Configuration drift check
        run: node scripts/check-config-drift.mjs

      - name: Application drift check
        run: node scripts/check-application-drift.mjs

      - name: Environment drift check
        run: node scripts/check-environment-drift.mjs

      - name: Schema drift check
        run: node scripts/check-schema-drift.mjs
