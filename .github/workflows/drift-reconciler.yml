name: "Process Drift PR Decision"
run-name: "Drift PR Decision — ${{ github.event.pull_request.merged == true && 'ACCEPTED' || 'REJECTED' }} (#${{ github.event.pull_request.number }})"

on:
  pull_request:
    types: [closed]
    branches:
      - main

  workflow_dispatch:
    inputs:
      action_type:
        description: 'Manual override'
        required: true
        type: choice
        options:
          - 'Accept (Align State)'
          - 'Reject (Revert Code)'
      scope:
        description: 'Target scope (account + region)'
        required: true
        type: choice
        options:
          - 'scope-a'
          - 'scope-b'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.8"

jobs:
  # ------------------------------------------------------------------
  # Resolve which scope (account + region) this PR or manual run targets
  # by inspecting the PR branch name / title or the workflow_dispatch
  # input.  Outputs the matching GitHub Environment, secret/variable
  # names, and terraform working directory for downstream steps.
  # ------------------------------------------------------------------
  resolve-scope:
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'Drift fix')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      scope:           ${{ steps.scope.outputs.scope }}
      gh_environment:  ${{ steps.scope.outputs.gh_environment }}
      aws_region_var:  ${{ steps.scope.outputs.aws_region_var }}
      role_arn_var:    ${{ steps.scope.outputs.role_arn_var }}
      tf_working_dir:  ${{ steps.scope.outputs.tf_working_dir }}
    steps:
      - name: Resolve scope from PR metadata or manual input
        id: scope
        run: |
          SCOPE="${{ github.event.inputs.scope }}"

          if [ -z "$SCOPE" ]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
            TITLE="${{ github.event.pull_request.title }}"

            case "$BRANCH" in
              *drift-fix/scope-a/*) SCOPE="scope-a" ;;
              *drift-fix/scope-b/*) SCOPE="scope-b" ;;
            esac

            if [ -z "$SCOPE" ]; then
              case "$TITLE" in
                *"[scope-a]"*) SCOPE="scope-a" ;;
                *"[scope-b]"*) SCOPE="scope-b" ;;
              esac
            fi
          fi

          if [ -z "$SCOPE" ]; then
            echo "::error::Could not resolve scope from branch, title, or input"
            exit 1
          fi

          case "$SCOPE" in
            scope-a)
              ENV="scope-a-apply"
              REGION_VAR="PROD_A_REGION"
              ROLE_VAR="SCOPE_A_APPLY_ROLE_ARN"
              TF_DIR="terraform_code/ec2_terraform_account_a"
              ;;
            scope-b)
              ENV="scope-b-apply"
              REGION_VAR="PROD_B_REGION"
              ROLE_VAR="SCOPE_B_APPLY_ROLE_ARN"
              TF_DIR="terraform_code/ec2_terraform_account_b"
              ;;
            *)
              echo "::error::Unknown scope: $SCOPE"
              exit 1
              ;;
          esac

          echo "scope=$SCOPE"                 >> "$GITHUB_OUTPUT"
          echo "gh_environment=$ENV"           >> "$GITHUB_OUTPUT"
          echo "aws_region_var=$REGION_VAR"   >> "$GITHUB_OUTPUT"
          echo "role_arn_var=$ROLE_VAR"       >> "$GITHUB_OUTPUT"
          echo "tf_working_dir=$TF_DIR"       >> "$GITHUB_OUTPUT"

          echo "🔍 Resolved scope=$SCOPE  env=$ENV  dir=$TF_DIR"

  # ------------------------------------------------------------------
  # Apply or revert the drift fix in the resolved scope.
  # ------------------------------------------------------------------
  reconcile-infra:
    needs: [resolve-scope]
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'Drift fix')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-scope.outputs.gh_environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Always check out the base branch (main), never the merge ref.
          # On ACCEPT the drift-fix is already merged into main, so this
          # gives the accepted state.  On REJECT main was never touched,
          # so this gives the pre-drift state to revert to.  Same ref,
          # correct result either way — no dependency on the ephemeral
          # refs/pull/<PR>/merge that can be stale or gone post-close.
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Resolve scope credentials
        id: creds
        run: |
          SCOPE="${{ needs.resolve-scope.outputs.scope }}"
          case "$SCOPE" in
            scope-a)
              ROLE="${{ secrets.SCOPE_A_APPLY_ROLE_ARN }}"
              REGION="${{ vars.PROD_A_REGION }}"
              ;;
            scope-b)
              ROLE="${{ secrets.SCOPE_B_APPLY_ROLE_ARN }}"
              REGION="${{ vars.PROD_B_REGION }}"
              ;;
            *)
              echo "::error::Unknown scope: $SCOPE"
              exit 1
              ;;
          esac

          if [ -z "$ROLE" ]; then
            echo "::error::Secret SCOPE_*_APPLY_ROLE_ARN is empty — check GitHub Secrets for scope=$SCOPE"
            exit 1
          fi
          if [ -z "$REGION" ]; then
            echo "::error::Variable PROD_*_REGION is empty — check GitHub Variables for scope=$SCOPE"
            exit 1
          fi

          echo "role_arn=$ROLE"       >> "$GITHUB_OUTPUT"
          echo "aws_region=$REGION"   >> "$GITHUB_OUTPUT"
          echo "🔐 Resolved role_arn=${ROLE:0:20}... region=$REGION"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.creds.outputs.role_arn }}
          aws-region: ${{ steps.creds.outputs.aws_region }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ needs.resolve-scope.outputs.tf_working_dir }}
        run: terraform init

      # =================================================================
      # SCENARIO A: ACCEPTED (Merged) → Code already matches live state
      # =================================================================
      - name: "[ACCEPT] Apply Drift Fix"
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action_type == 'Accept (Align State)')
        working-directory: ${{ needs.resolve-scope.outputs.tf_working_dir }}
        run: |
          echo "✅ ACCEPTED: Applying approved drift fix to ${{ needs.resolve-scope.outputs.scope }}..."
          terraform plan -out=tfplan -input=false
          terraform apply -auto-approve tfplan

      # =================================================================
      # SCENARIO B: REJECTED (Closed) → Revert AWS to match original code
      # =================================================================
      - name: "[REJECT] Revert Drift to Match Code"
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.merged == false) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action_type == 'Reject (Revert Code)')
        working-directory: ${{ needs.resolve-scope.outputs.tf_working_dir }}
        run: |
          echo "❌ REJECTED: Planning revert to original code for ${{ needs.resolve-scope.outputs.scope }}..."
          terraform plan -out=tfplan -input=false
          echo "Applying revert..."
          terraform apply -auto-approve tfplan

      - name: Comment Result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const merged = '${{ github.event.pull_request.merged }}' === 'true';
            const scope  = '${{ needs.resolve-scope.outputs.scope }}';
            const outcome = merged
              ? `✅ **ACCEPTED** (${scope}): Drift fix applied.`
              : `❌ **REJECTED** (${scope}): Drift reverted. AWS restored to original code.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: outcome
            });
