<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-url" content="__SUPABASE_URL__">
  <meta name="supabase-anon-key" content="__SUPABASE_ANON_KEY__">
  <title>Drift Reconciler — Run Scan</title>
  <link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="env-selector.js" defer></script>
</head>
<body>
  <header>
    <h1>Drift Reconciler — Run Scan</h1>
    <nav class="site-nav">
      <a href="/">Dashboard</a>
      <a href="/explorer">Explorer</a>
      <a href="/scan" class="active">Scan</a>
      <a href="/rollback">Rollback</a>
      <a href="/trends">Trends</a>
      <a href="/exceptions">Exceptions</a>
      <a href="/alerts">Alerts</a>
      <a href="/environments">Environments</a>
    </nav>
  </header>

  <main>
    <form id="scan-form" class="scan-form">
      <label class="filter-group">
        Environment
        <select id="scan-scope" required>
          <option value="">Select environment...</option>
        </select>
      </label>

      <label class="filter-group">
        <input type="checkbox" id="scan-unmanaged">
        Scan unmanaged resources
      </label>

      <button type="submit" id="scan-submit">Run Scan</button>
    </form>

    <div id="scan-stages" class="stages">
      <div class="stage" id="stage-1" data-stage="unmanaged_scan">
        <span class="stage-dot"></span>
        Unmanaged Scan
      </div>
      <div class="stage" id="stage-2" data-stage="reconcile_agent">
        <span class="stage-dot"></span>
        Reconcile Agent
      </div>
      <div class="stage" id="stage-3" data-stage="trivy_gate">
        <span class="stage-dot"></span>
        Trivy Gate
      </div>
      <div class="stage" id="stage-4" data-stage="drift_alert">
        <span class="stage-dot"></span>
        Alert
      </div>
      <div class="stage" id="stage-5" data-stage="drift_pr">
        <span class="stage-dot"></span>
        Drift PR
      </div>
    </div>

    <div id="scan-result" hidden>
      <h2>Results</h2>
      <div id="scan-result-body"></div>
    </div>
  </main>
<script>
let _client = null;

function _supabase() {
  if (_client) return _client;
  const url = document.querySelector('meta[name="supabase-url"]').content;
  const key = document.querySelector('meta[name="supabase-anon-key"]').content;
  if (!url || !key || url.startsWith("__")) {
    throw new Error("Supabase URL or anon key not configured.");
  }
  _client = window.supabase.createClient(url, key);
  return _client;
}

function _errorMsg(message) {
  const el = document.getElementById("scan-result");
  el.hidden = false;
  document.getElementById("scan-result-body").textContent = message;
}

function _resetStages() {
  document.querySelectorAll(".stage").forEach(s => {
    s.classList.remove("active", "done", "done-noop", "failed", "skipped");
  });
}

const _STAGE_ORDER = ["unmanaged_scan", "reconcile_agent", "trivy_gate", "drift_alert", "drift_pr"];

function updateTracker(row) {
  if (!row) return;
  const current = row.current_stage;
  const status = row.status;

  var rawSummary = row.result_summary;
  var summary = rawSummary;
  if (!summary) summary = {};
  else if (typeof summary === "string") { try { summary = JSON.parse(summary); } catch(e) { summary = {}; } }
  var skippedStages = summary.skipped_stages || [];

  document.querySelectorAll(".stage").forEach(el => {
    const stage = el.dataset.stage;
    const idx = _STAGE_ORDER.indexOf(stage);
    const curIdx = _STAGE_ORDER.indexOf(current);

    el.classList.remove("active", "done", "done-noop", "failed", "skipped");

    if (status === "failed" && idx === curIdx) {
      el.classList.add("failed");
    } else if (status === "complete" && skippedStages.indexOf(stage) !== -1) {
      el.classList.add("skipped");
    } else if (status === "complete") {
      el.classList.add("done");
    } else if (idx < curIdx) {
      el.classList.add("done");
    } else if (idx === curIdx) {
      el.classList.add("active");
    }
  });

  // Post-process: mark no-op stages (hollow dot) when they ran but
  // produced nothing.
  if (status === "complete") {
    var drCount = (summary.drift && summary.drift.count) || 0;
    var umCount = (summary.unmanaged && summary.unmanaged.count) || 0;
    var allPrLinks = prLinks || [];

    // reconcile_agent: no findings at all → no-op.
    if (drCount === 0 && umCount === 0) {
      var recStage = document.querySelector('.stage[data-stage="reconcile_agent"]');
      if (recStage) { recStage.classList.remove("done"); recStage.classList.add("done-noop"); }
    }

    // drift_pr / stage-5: no PRs created → no-op.
    if (allPrLinks.length === 0) {
      var prStage = document.querySelector('.stage[data-stage="drift_pr"]');
      if (prStage) { prStage.classList.remove("done"); prStage.classList.add("done-noop"); }
    }

    // drift_alert: no alerts actually sent → no-op.
    var alertsSent = summary.alerts_sent;
    if (alertsSent && !alertsSent.pagerduty && !alertsSent.slack) {
      var alertStage = document.querySelector('.stage[data-stage="drift_alert"]');
      if (alertStage) { alertStage.classList.remove("done"); alertStage.classList.add("done-noop"); }
    }
  }

  const resultEl = document.getElementById("scan-result");
  const bodyEl = document.getElementById("scan-result-body");

  var prLinks = row.pr_links || [];
  if (typeof prLinks === "string") { try { prLinks = JSON.parse(prLinks); } catch(e) { prLinks = []; } }

  if (status === "complete") {
    resultEl.hidden = false;
    let html = "";

    // Stage-5 chips: Drift PR (N) / Unmanaged PR (N) from actual data.
    var driftPrCount = (summary.drift && summary.drift.pr_links && summary.drift.pr_links.length) || 0;
    var unmPrCount = (summary.unmanaged && summary.unmanaged.pr_links && summary.unmanaged.pr_links.length) || 0;
    var stage5 = document.getElementById("stage-5");
    if (stage5) {
      // Clear everything after the stage-dot span.
      while (stage5.childNodes.length > 1) stage5.removeChild(stage5.lastChild);
      if (driftPrCount > 0 || unmPrCount > 0) {
        var chips = '';
        if (driftPrCount > 0) chips += '<span style="color:#3fb950;margin-right:8px">Drift PR (' + driftPrCount + ')</span>';
        if (unmPrCount > 0) chips += '<span style="color:#58a6ff">Unmanaged PR (' + unmPrCount + ')</span>';
        var chipSpan = document.createElement('span');
        chipSpan.innerHTML = chips;
        stage5.appendChild(chipSpan);
      } else {
        stage5.appendChild(document.createTextNode(' Drift PR'));
      }
    }

    // Mode banner.
    var mode = summary.mode || (summary.drift ? (summary.drift.found ? "full" : "unmanaged_only") : (summary.unmanaged && summary.unmanaged.found ? "unmanaged_only" : "drift_only"));
    if (mode === "full") {
      html += '<p style="color:#3fb950;font-size:14px;margin-bottom:8px">✓ Full scan complete</p>';
    } else if (mode === "unmanaged_only") {
      html += '<p style="color:#d29922;font-size:14px;margin-bottom:8px">⚠ Terraform state unavailable — only unmanaged resources checked</p>';
    } else if (mode === "drift_only") {
      html += '<p style="color:#58a6ff;font-size:14px;margin-bottom:8px">Drift check complete — unmanaged scanning skipped</p>';
    }

    var hasDrift = summary.drift && summary.drift.found;
    var hasUnmanaged = summary.unmanaged && summary.unmanaged.found;
    // Legacy fallback.
    if (!hasDrift && !hasUnmanaged && summary.unmanaged_resources && summary.unmanaged_resources.length > 0) {
      hasUnmanaged = true;
      summary.unmanaged = { found: true, count: summary.unmanaged_resources.length, findings: summary.unmanaged_resources, pr_links: [] };
    }

    if (hasDrift || hasUnmanaged) {
      // Configuration Drift section.
      if (hasDrift) {
        html += '<p style="color:#8b949e;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Configuration Drift (' + summary.drift.count + ')</p>';
        html += '<ul style="margin-bottom:8px">';
        summary.drift.findings.forEach(function(r) {
          var sevClass = 'sev-' + (r.risk_level || 'LOW').toLowerCase();
          html += '<li><span class="' + sevClass + '">' + (r.risk_level || 'LOW') + '</span> <code>' + (r.resource_id || '?') + '</code></li>';
        });
        html += '</ul>';
        if (summary.drift.pr_links && summary.drift.pr_links.length > 0) {
          html += '<ul style="margin-bottom:8px">' + summary.drift.pr_links.map(function(url) {
            return '<li><a href="' + url + '" target="_blank">' + url + '</a></li>';
          }).join("") + '</ul>';
        }
      }

      // Unmanaged Resources section.
      if (hasUnmanaged) {
        html += '<p style="color:#8b949e;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Unmanaged Resources Found (' + summary.unmanaged.count + ')</p>';
        html += '<ul style="margin-bottom:4px">';
        summary.unmanaged.findings.forEach(function(r) {
          var sevClass = 'sev-' + (r.risk_level || 'LOW').toLowerCase();
          html += '<li><span class="' + sevClass + '">' + (r.risk_level || 'LOW') + '</span> <code>' + (r.resource_id || '?') + '</code></li>';
        });
        html += '</ul>';
        html += '<p style="color:#8b949e;font-size:11px;margin-bottom:8px">These PRs add tracking/import for these resources — they are NOT drift fixes</p>';
        if (summary.unmanaged.pr_links && summary.unmanaged.pr_links.length > 0) {
          html += '<ul style="margin-bottom:8px">' + summary.unmanaged.pr_links.map(function(url) {
            return '<li><a href="' + url + '" target="_blank">' + url + '</a></li>';
          }).join("") + '</ul>';
        }
      }
    } else {
      html += '<p style="color:#8b949e;font-size:14px">No drift and no unmanaged resources found.</p>';
    }

    if (summary.report_path) {
      html += '<p style="margin-top:12px">Report: <code>' + summary.report_path + '</code></p>';
    }
    if (!html) html = "<p>Scan completed successfully.</p>";
    bodyEl.innerHTML = html;
  } else if (status === "failed") {
    resultEl.hidden = false;
    if (summary.summary) {
      // New structured format
      var html = '<p style="color:#e6edf3;font-size:14px;margin-bottom:6px">' + summary.summary + '</p>';
      if (summary.suggestion) {
        html += '<p style="color:#8b949e;font-size:13px;margin-bottom:10px">Suggested next step: ' + summary.suggestion + '</p>';
      }
      if (summary.detail) {
        html += '<details style="font-size:12px;color:#8b949e">' +
                '<summary style="cursor:pointer;margin-bottom:8px">Show technical details</summary>' +
                '<pre style="padding:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;overflow-x:auto;white-space:pre-wrap;font-size:11px;color:#c9d1d9">' +
                summary.detail + '</pre></details>';
      }
      bodyEl.innerHTML = html;
    } else {
      // Legacy flat error format
      bodyEl.innerHTML = '<p style="color:#e6edf3;font-size:14px;margin-bottom:6px">Scan failed. See details below.</p>' +
        '<details style="font-size:12px;color:#8b949e">' +
        '<summary style="cursor:pointer;margin-bottom:8px">Show technical details</summary>' +
        '<pre style="padding:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;overflow-x:auto;white-space:pre-wrap;font-size:11px;color:#c9d1d9">' +
        (summary.error || "unknown error") + '</pre></details>';
    }
  }
}

function startPolling(runId) {
  var fallbackTimer = null;
  var stopped = false;
  var pollStart = Date.now();
  var TIMEOUT_MS = 300000; // 5 minutes

  function _checkTimeout(currentStatus) {
    if (currentStatus && currentStatus !== "running") return false;
    if (Date.now() - pollStart > TIMEOUT_MS) {
      _stop();
      var btn = document.getElementById("scan-submit");
      btn.disabled = false;
      btn.textContent = "Run Scan";
      var el = document.getElementById("scan-result");
      el.hidden = false;
      document.getElementById("scan-result-body").innerHTML =
        '<div class="error">This scan is taking longer than expected. ' +
        'Check server logs — the backend may have failed without reporting status.</div>';
      return true;
    }
    return false;
  }

  function _fallbackPoll() {
    clearTimeout(fallbackTimer);
    fallbackTimer = setTimeout(async function() {
      if (stopped) return;
      if (_checkTimeout()) return;
      try {
        var result = await _supabase()
          .from("scan_runs")
          .select("status, current_stage, result_summary, pr_links")
          .eq("id", runId)
          .single();
        if (result.data) updateTracker(result.data);
      } catch (err) { /* silent */ }
    }, 30000);
  }

  function _stop() {
    stopped = true;
    clearTimeout(fallbackTimer);
    _supabase().removeChannel(channel);
  }

  var channel = _supabase()
    .channel("scan_run_" + runId)
    .on(
      "postgres_changes",
      { event: "UPDATE", schema: "public", table: "scan_runs", filter: "id=eq." + runId },
      function(payload) {
        if (stopped) return;
        if (_checkTimeout(payload.new.status)) return;
        if (payload.new) updateTracker(payload.new);
        _fallbackPoll();
        if (payload.new.status === "complete" || payload.new.status === "failed") {
          _stop();
          var btn = document.getElementById("scan-submit");
          btn.disabled = false;
          btn.textContent = "Run Scan";
        }
      }
    )
    .subscribe(function(status) {
      if (status === "SUBSCRIBED") {
        _fallbackPoll();
      }
    });
}

async function _resumeRunningScan() {
  var selectedScope = document.getElementById("scan-scope").value;
  // Check all active environments for any running scan.
  var envs = window.EnvSelector ? await window.EnvSelector.fetchEnvironments().catch(function() { return []; }) : [];
  var slugs = envs.map(function(e) { return e.slug; });
  var scopes = selectedScope ? [selectedScope] : slugs;
  for (var i = 0; i < scopes.length; i++) {
    try {
      var result = await _supabase()
        .from("scan_runs")
        .select("id,status,current_stage,result_summary,pr_links")
        .eq("scope", scopes[i])
        .eq("status", "running")
        .order("started_at", { ascending: false })
        .limit(1)
        .maybeSingle();
      if (result.data) {
        document.getElementById("scan-scope").value = scopes[i];
        document.getElementById("scan-submit").disabled = true;
        document.getElementById("scan-submit").textContent = "Running...";
        _resetStages();
        startPolling(result.data.id);
        return;
      }
    } catch (err) { /* continue to next scope */ }
  }
}

document.addEventListener("DOMContentLoaded", function() {
  var form = document.getElementById("scan-form");
  var btn = document.getElementById("scan-submit");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    var scope = document.getElementById("scan-scope").value;
    var unmanaged = document.getElementById("scan-unmanaged").checked;

    if (!scope) return;

    btn.disabled = true;
    btn.textContent = "Starting...";
    _resetStages();
    document.getElementById("scan-result").hidden = true;

    try {
      var resp = await fetch("/api/scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ scope: scope, unmanaged_flag: unmanaged }),
      });

      var data = await resp.json().catch(function() { return {}; });

      if (resp.status === 202 && data.run_id) {
        startPolling(data.run_id);
      } else if (resp.status === 409) {
        _errorMsg("Scan already running for " + scope + " (run: " + (data.run_id || "unknown") + ")");
        btn.disabled = false;
        btn.textContent = "Run Scan";
      } else {
        _errorMsg(data.error || "Unexpected error (" + resp.status + ")");
        btn.disabled = false;
        btn.textContent = "Run Scan";
      }
    } catch (err) {
      _errorMsg(err.message || "Network error — is the server running?");
      btn.disabled = false;
      btn.textContent = "Run Scan";
    }
  });

  // Populate scope dropdown from environments.
  window.EnvSelector.fetchEnvironments().then(function(envs) {
    var sel = document.getElementById("scan-scope");
    envs.forEach(function(env) {
      var opt = document.createElement("option");
      opt.value = env.slug;
      opt.textContent = env.name + " (" + env.region + ")";
      sel.appendChild(opt);
    });
  }).catch(function() {});

  _resumeRunningScan();
});
</script>
</body>
</html>
