name: "Process Drift PR Decision"

on:
  pull_request:
    types: [closed]
    branches:
      - main

  workflow_dispatch:
    inputs:
      action_type:
        description: 'Manual override'
        required: true
        type: choice
        options:
          - 'Accept (Align State)'
          - 'Reject (Revert Code)'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: "us-east-1"
  TF_VERSION: "1.9.8"

jobs:
  reconcile-infra:
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'Drift fix')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      # =================================================================
      # SCENARIO A: ACCEPTED (Merged) → Code already matches live state
      # =================================================================
      - name: "[ACCEPT] Apply Drift Fix"
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action_type == 'Accept (Align State)')
        run: |
          echo "✅ ACCEPTED: Applying approved drift fix..."
          terraform plan -out=tfplan -input=false
          terraform apply -auto-approve tfplan

      # =================================================================
      # SCENARIO B: REJECTED (Closed) → Revert AWS to match original code
      # =================================================================
      - name: "[REJECT] Refresh State + Revert Drift"
        if: |
          (github.event_name == 'pull_request' && github.event.pull_request.merged == false) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action_type == 'Reject (Revert Code)')
        run: |
          echo "❌ REJECTED: Detecting live drift and reverting..."
          
          # CRITICAL: Refresh state to match LIVE AWS first
          # Otherwise Terraform doesn't know drift exists
          echo "Step 1: Refreshing state to match live AWS..."
          terraform plan -refresh-only -input=false
          
          # Now state = live, code = original. Plan will show revert diff.
          echo "Step 2: Planning revert to original code..."
          terraform plan -out=tfplan -input=false
          
          echo "Step 3: Applying revert..."
          terraform apply -auto-approve tfplan

      - name: Comment Result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const merged = '${{ github.event.pull_request.merged }}' === 'true';
            const outcome = merged 
              ? '✅ **ACCEPTED**: Drift fix applied.' 
              : '❌ **REJECTED**: Drift reverted. AWS restored to original code.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: outcome
            });